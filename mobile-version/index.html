<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Loading...</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a252f">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@300;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>

    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open Menu">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="profile-header">
                <img src="images/formal.jpg" alt="Profile Picture" class="profile-img">
                <div class="name-title">
                    <h1 id="p-name"></h1>
                    <p id="p-title"></p>
                </div>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="#profile" class="active"><i class="fas fa-user-circle"></i> Profile</a></li>
                    <li><a href="#education"><i class="fas fa-graduation-cap"></i> Education</a></li>
                    <li><a href="#experience"><i class="fas fa-briefcase"></i> Experience</a></li>
                    <li><a href="#skills"><i class="fas fa-code"></i> Skills</a></li>
                    <li><a href="#projects"><i class="fas fa-laptop-code"></i> Projects</a></li>
                </ul>
            </nav>

            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span id="p-email"></span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span id="p-phone"></span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="p-address"></span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- ABOUT -->
            <section id="profile">
                <h2 class="section-title">About Me</h2>
                <div class="content-block">
                    <p class="bio-text" id="p-bio"></p>
                </div>
            </section>

            <!-- EDUCATION -->
            <section id="education">
                <h2 class="section-title">Education</h2>
                <div id="education-list"></div>
            </section>

            <!-- EXPERIENCE -->
            <section id="experience">
                <h2 class="section-title">Experience</h2>
                <div id="experience-list"></div>
            </section>

            <!-- SKILLS -->
            <section id="skills">
                <h2 class="section-title">Technical Proficiency</h2>
                <div class="skills-grid" id="skills-list"></div>
            </section>

            <!-- PROJECTS -->
            <section id="projects">
                <h2 class="section-title">Created Projects</h2>
                <div id="projects-list"></div>
            </section>

        </main>
    </div>

    <!-- Data and Script -->
    <script src="data.js"></script>
    <script src="script.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>

</html>
